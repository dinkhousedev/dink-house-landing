name: Staging PR Cleanup

on:
  pull_request:
    branches:
      - staging
    types: [opened, synchronize, reopened]

jobs:
  cleanup-for-staging:
    # Only run when PR is from dev to staging
    if: github.head_ref == 'dev' || startsWith(github.head_ref, 'dev/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Remove console statements
        run: |
          # Find all JS/TS/JSX/TSX files and remove console statements
          # Exclude scripts/, config files, and lib/logger.ts
          find . -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -not -path "*/scripts/*" \
            -not -path "*/*.config.*" \
            -not -path "*/lib/logger.*" \
            -exec sed -i '/console\.\(log\|debug\|info\|warn\|trace\|table\|time\|timeEnd\)/d' {} \;

      - name: Remove debugger statements
        run: |
          find . -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -exec sed -i '/^\s*debugger;*\s*$/d' {} \;

      - name: Remove development comments
        run: |
          # Remove TODO, FIXME, DEBUG comments
          find . -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -exec sed -i '/\/\/.*\(TODO\|FIXME\|DEBUG\|XXX\|HACK\)/d' {} \;

      - name: Run linter
        run: npm run lint --fix || true

      - name: Run format
        run: npm run format || npx prettier --write "**/*.{js,jsx,ts,tsx,json,css,md}"

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: cleanup debug code for staging deployment

          - Remove console.log and debug statements
          - Remove debugger statements
          - Remove development comments (TODO, FIXME, DEBUG)
          - Auto-format code

          🤖 Generated by GitHub Actions"
          git push

      - name: Add PR comment
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Staging Cleanup Complete**\n\nThe following cleanup actions were performed:\n- Removed `console.log()`, `console.debug()`, and other console statements\n- Removed `debugger` statements\n- Removed development comments (TODO, FIXME, DEBUG, etc.)\n- Code auto-formatted\n\nThis branch is now ready for staging deployment. 🚀'
            })

      - name: Build verification
        run: |
          npm run build
        env:
          NODE_ENV: production

      - name: Add build status comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Production Build Verified**\n\nThe cleaned code builds successfully for production.'
            })

  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Check for console statements
        run: |
          # Check for console statements but exclude scripts, config files, and logger
          if grep -r "console\.\(log\|debug\|info\)" \
            --include="*.js" \
            --include="*.jsx" \
            --include="*.ts" \
            --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            --exclude-dir=scripts \
            --exclude="*.config.*" \
            --exclude="logger.*" \
            .; then
            echo "⚠️ Warning: Console statements found in application code"
            exit 1
          fi
