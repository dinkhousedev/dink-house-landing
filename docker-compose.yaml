services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dink-house-landing
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
