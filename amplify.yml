version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Set production environment explicitly
        - export NODE_ENV=production
        - export NEXT_TELEMETRY_DISABLED=1
        - echo "Building for branch $AWS_BRANCH - Node version:"
        - node --version
        - npm --version

        # Fetch secrets based on branch
        # Production (us-east-1): Fetch from SSM Parameter Store
        # Staging/Dev (us-east-1): Use Amplify environment variables
        - |
          if [ "$AWS_BRANCH" = "production" ]; then
            echo "🔒 Production branch detected - fetching secrets from SSM Parameter Store (us-east-1)"
            export STRIPE_SECRET_KEY=$(aws ssm get-parameter --name /dink-house/production/stripe-secret-key --with-decryption --query Parameter.Value --output text --region us-east-1)
            export STRIPE_WEBHOOK_SECRET=$(aws ssm get-parameter --name /dink-house/production/stripe-webhook-secret --with-decryption --query Parameter.Value --output text --region us-east-1)
            export DB_PASSWORD=$(aws ssm get-parameter --name /dink-house/production/db-password --with-decryption --query Parameter.Value --output text --region us-east-1)
            echo "✓ Secrets fetched from SSM successfully"
          else
            echo "🔧 Non-production branch ($AWS_BRANCH) - using Amplify environment variables (no SSM)"
            echo "✓ Using environment variables set in Amplify Console"
          fi

        # Install dependencies (package-lock.json is gitignored)
        - npm install

        # Verify no debug packages are in production dependencies
        - echo "Verifying production dependencies..."
        - npm list --production --depth=0 || true

    build:
      commands:
        # Set production flags
        - export NODE_ENV=production
        - export NEXT_TELEMETRY_DISABLED=1

        # Build with production optimizations
        # Next.js will automatically:
        # - Strip console.log (configured in next.config.js)
        # - Minify all code with SWC
        # - Remove React DevTools
        # - Enable production React mode
        # - Optimize images
        # - Tree-shake unused code
        - npm run build:production

        # Verify build completed successfully
        - echo "Verifying build artifacts..."
        - test -d .next || (echo "Build failed - .next directory not found" && exit 1)
        - test -f .next/BUILD_ID || (echo "Build failed - BUILD_ID not found" && exit 1)

        # Check for any accidental console.log in built files (extra safety)
        - echo "Scanning for remaining console statements in production build..."
        - |
          if grep -r "console\.log" .next/static --exclude="*.map" 2>/dev/null; then
            echo "WARNING: Found console.log statements in production build"
            echo "This may indicate a build configuration issue"
          else
            echo "✓ No console.log statements found in production bundles"
          fi

        # Check bundle sizes
        - echo "Build completed successfully"
        - du -sh .next

    postBuild:
      commands:
        # Clean up development artifacts
        - echo "Cleaning up development artifacts..."
        - rm -rf node_modules/.cache
        - rm -rf .next/cache/webpack

        # Output production environment info
        - echo "Production build complete"
        - echo "NODE_ENV=$NODE_ENV"

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      # Cache node_modules for faster installs
      - node_modules/**/*
      # Cache Next.js build cache (but not webpack dev cache)
      - .next/cache/**/*
      - '!.next/cache/webpack/**/*'

# Environment variables (configure in AWS Amplify Console)
# These should be set in the Amplify Console > App Settings > Environment Variables
#
# IMPORTANT: Branch-specific configuration
# - Production branch (us-east-1): Secrets fetched from SSM Parameter Store
# - Staging/Dev branches (us-east-1): All variables set directly in Amplify Console
#
# REQUIRED AMPLIFY ENVIRONMENT VARIABLES (All Branches):
# - NODE_ENV=production
# - NEXT_TELEMETRY_DISABLED=1
# - DB_HOST=<rds-endpoint>
# - DB_PORT=5432
# - DB_NAME=dink_house
# - DB_USER=postgres
# - DB_SSL=true
# - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=<pk_live_... or pk_test_...>
# - CONTACT_EMAIL=<contact-email>
# - FROM_EMAIL=<from-email>
# - SITE_URL=<site-url>
# - NEXT_PUBLIC_SITE_URL=<site-url>
# - NEXT_PUBLIC_AWS_API_URL=<api-gateway-url>
# - AWS_API_URL=<api-gateway-url>
# - NEXT_PUBLIC_CLOUDFRONT_URL=<cloudfront-url>
# - NEXT_PUBLIC_MEDIA_BUCKET=<s3-bucket-name>
# - RATE_LIMIT_PER_MINUTE=<rate-limit>
# - RATE_LIMIT_PER_HOUR=<rate-limit>
#
# AWS APPSYNC GRAPHQL API (Required for newsletter/waitlist signup):
# - NEXT_PUBLIC_APPSYNC_API_URL=https://swszcyfekzd4rcyhulnj7ud5vy.appsync-api.us-east-2.amazonaws.com/graphql
# - NEXT_PUBLIC_APPSYNC_API_KEY=<appsync-api-key>
# - NEXT_PUBLIC_APPSYNC_REGION=us-east-2
#
# SUPABASE (Required for newsletter resubscribe):
# - NEXT_PUBLIC_SUPABASE_URL=https://api.dinkhousepb.com
# - NEXT_PUBLIC_SUPABASE_ANON_KEY=<supabase-anon-key>
#
# ADDITIONAL VARIABLES FOR NON-PRODUCTION BRANCHES (Staging/Dev only):
# These are NOT needed for production (fetched from SSM instead):
# - STRIPE_SECRET_KEY=<sk_test_...>
# - STRIPE_WEBHOOK_SECRET=<whsec_...>
# - DB_PASSWORD=<staging-db-password>
#
# SSM PARAMETERS (Production only - us-east-1):
# - /dink-house/production/stripe-secret-key (SecureString)
# - /dink-house/production/stripe-webhook-secret (SecureString)
# - /dink-house/production/db-password (SecureString)

# SECURITY NOTES:
# 1. Console logs are stripped via next.config.js compiler.removeConsole
# 2. React runs in production mode (no DevTools, no debug warnings)
# 3. All code is minified via SWC (swcMinify: true)
# 4. Source maps are not deployed to production
# 5. Powered-by header is disabled (poweredByHeader: false)
# 6. ESLint is configured to ignore during builds for faster deployment
# 7. No development dependencies are included in the build
# 8. Webpack cache is excluded from deployment artifacts
